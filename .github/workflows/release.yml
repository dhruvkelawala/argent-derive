name: Build and release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: argent-derive-linux-x64
            binary_name: argent-derive-linux-x64
          - os: macos-14
            artifact_name: argent-derive-macos-arm64
            binary_name: argent-derive-macos-arm64
          - os: macos-13
            artifact_name: argent-derive-macos-x64
            binary_name: argent-derive-macos-x64
          - os: windows-latest
            artifact_name: argent-derive-windows-x64
            binary_name: argent-derive-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile standalone binary
        run: bun build --compile --minify --target=bun index.ts --outfile=dist/${{ matrix.binary_name }}

      - name: Upload compiled binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: argent-derive-linux-x64
          path: dist/argent-derive-linux-x64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: argent-derive-macos-x64
          path: dist/argent-derive-macos-x64

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: argent-derive-macos-arm64
          path: dist/argent-derive-macos-arm64

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: argent-derive-windows-x64
          path: dist/argent-derive-windows-x64

      - name: Normalize executable names
        run: |
          chmod +x dist/argent-derive-linux-x64/argent-derive-linux-x64
          chmod +x dist/argent-derive-macos-x64/argent-derive-macos-x64

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: |
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            dist/argent-derive-linux-x64/argent-derive-linux-x64
            dist/argent-derive-macos-x64/argent-derive-macos-x64
            dist/argent-derive-macos-arm64/argent-derive-macos-arm64
            dist/argent-derive-windows-x64/argent-derive-windows-x64.exe
